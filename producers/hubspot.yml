# Virtual-join producers (see specs/VIRTUAL_CYPHER.md). Each is a BATCH-keyed
# fetch: it accepts ALL anchor keys at once and returns the matching records, so
# a traversal over many anchors costs one search, not N. Backed by the curated
# HubSpot `objectsSearch` op (POST /crm/v3/objects/{objectType}/search), whose
# `filterGroups[].filters[].values` takes an `IN` list — the keys are injected
# there via `keyArg`. The JVM never sees HubSpot's REST shape beyond these two
# pointers.

- name: contactsByEmail
  kind: api
  operation: objectsSearch
  records: "$.results[*].properties"
  keyArg: "filterGroups.0.filters.0.values"
  args:
    objectType: contacts
    properties: [email, firstname, lastname, jobtitle, phone, company]
    filterGroups:
      - filters:
          - propertyName: email
            operator: IN
  cache:
    kind: ttl
    seconds: 300

- name: companiesByDomain
  kind: api
  operation: objectsSearch
  records: "$.results[*].properties"
  keyArg: "filterGroups.0.filters.0.values"
  args:
    objectType: companies
    properties: [domain, name, industry, website, city, country]
    filterGroups:
      - filters:
          - propertyName: domain
            operator: IN
  cache:
    kind: ttl
    seconds: 300

# Resolve a Person to their HubSpot owner by email. `ownersList` (GET /crm/v3/owners)
# has no IN filter, so this fetches the org's owners (a small set — they're CRM users)
# and the join matches each record's `email` to the queried Person emails. The owner
# record carries `id` (the numeric owner id contacts filter by) + `email`/`firstName`/
# `lastName`, stored straight onto the HubSpotOwner node.
- name: ownersByEmail
  kind: api
  operation: ownersList
  records: "$.results[*]"
  cost:                  # one ownersList call covers all anchors → batchable + cheap bucket; the
    bucket: hubspot      # optimizer resolves every anchor now (no deferral), unlike GitHub search
    rate: 100/10s
    batch: true
  cache:
    kind: ttl
    seconds: 600

# The contacts a given owner owns: search contacts where `hubspot_owner_id` is IN the
# anchor owner ids. Returns the recency fields so "not emailed lately" filters them
# (graph-side for now; a pushdown rule can scope it at the source later).
- name: contactsByOwner
  kind: api
  operation: objectsSearch
  records: "$.results[*].properties"
  keyArg: "filterGroups.0.filters.0.values"
  args:
    objectType: contacts
    properties: [email, firstname, lastname, jobtitle, phone, company, hubspot_owner_id, notes_last_contacted, hs_last_sales_activity_timestamp]
    filterGroups:
      - filters:
          - propertyName: hubspot_owner_id
            operator: IN
  cache:
    kind: ttl
    seconds: 300
