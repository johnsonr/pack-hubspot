# Pack-declared event source — see https://github.com/embabel/pack-spec
#
# This file is the SIGNAL-PROJECTION layer only. Signature verification
# and tenancy resolution are configured in webhooks/contact-creation.yml
# and run BEFORE this projection — by the time the dispatcher sees the
# payload, it's already authenticated as HubSpot's and routed to the
# right user.
#
# HubSpot's contact.creation webhook POSTs an array of events; the
# WebhookController unwraps the array and calls the dispatcher per inner
# event. The mapping below is for the inner event shape, matching
# https://developers.hubspot.com/docs/api/webhooks
- type: HubSpotContactCreated
  webhook:
    mapping:
      # Required Signal wire fields
      id:           "$.eventId"
      occurredAt:   "$.occurredAt"          # epoch millis — DynamicSignal converts
      sourceKind:   "hubspot"               # literal (no leading $)
      sourceId:     "$.objectId"            # the contact's HubSpot object id
      subject:      "New HubSpot contact"   # literal — templated subjects are a future slice
      # Type-specific properties (declared on HubSpotContactCreated in types/hubspot.yml)
      contactId:        "$.objectId"
      portalId:         "$.portalId"
      subscriptionType: "$.subscriptionType"
      changeSource:     "$.changeSource"
