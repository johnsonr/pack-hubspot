# HubSpot CRM v3 — vendored OpenAPI spec, OAuth2-authenticated.
#
# HubSpot no longer publishes per-API OpenAPI specs at a stable public
# URL (the old `api-catalog-public/v1/apis/...` endpoints all 404 as of
# 2026). The community-maintained alternatives drift from upstream.
#
# Strategy: hand-curated mini-spec covering the ~12 CRM ops that handle
# 95% of chat-driven workflows. Generalised over object type
# (`contacts | companies | deals | tickets`) so the surface stays small
# while coverage stays wide.
#
# Auth: OAuth2 against a HubSpot Public App registered ONCE per
# assistant deployment. Client credentials live in the deployment's
# `application.yml` under `assistant.oauth.apps.hubspot.*` — NEVER in
# this file (which is checked into the public pack repo) and NEVER in
# any end user's workspace. End users just click "Authorize" in
# Settings → Connected Services.
#
# The `identity:` block is a HubSpot fact (every install talks to the
# same introspection endpoint) so it stays here. Same for `auth-url`,
# `token-url`, `scopes`.
- url: hubspot-crm.json
  name: hubspot
  type: openapi
  auth: oauth2
  oauth2:
    auth-url: https://app.hubspot.com/oauth/authorize
    token-url: https://api.hubapi.com/oauth/v1/token
    scopes: >-
      crm.objects.contacts.read crm.objects.contacts.write
      crm.objects.companies.read crm.objects.companies.write
      crm.objects.deals.read crm.objects.deals.write
      crm.objects.owners.read tickets
    identity:
      url: https://api.hubapi.com/oauth/v1/access-tokens/{token}
      method: GET
      auth: path-token
      account-id-field: hub_id
      display-name-field: hub_domain
