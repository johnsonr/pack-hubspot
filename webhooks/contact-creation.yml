# HubSpot contact creation webhook.
#
# How this is wired end-to-end:
#
# 1. Operator configures the HubSpot Public App in app.hubspot.com →
#    Webhooks → Target URL = https://<your-public-host>/api/v1/webhooks/hubspot
#    and adds a `contact.creation` subscription.
#
# 2. End user OAuths in via Settings → Connected Services → HubSpot.
#    The OAuth callback resolves the portal's `hub_id` (declared in
#    `apis/apis.yml` under `oauth2.identity.account-id-field`) and
#    registers it as a webhook tenant under `hubspot-portal-id` (declared
#    under `oauth2.webhook-tenancy.store`).
#
# 3. HubSpot fires this webhook to the target URL. The platform:
#    - Reads `tenancy.field: portalId` from the JSON payload.
#    - Looks up `(hubspot-portal-id, portalId) → user` in the tenant
#      registry.
#    - Verifies `signature.scheme: hmac-sha256` against the OAuth client
#      secret declared in `oauth-apps.yml` under `apps.hubspot.client-secret`
#      (same secret HubSpot uses to sign).
#    - Routes the event to the resolved user's workspace and runs the
#      action below (or queues if the user hasn't configured one yet).
#
# Subscription type reference:
#  - `contact.creation` — any new Contact (lifecyclestage may be lead,
#    subscriber, customer, …; filter in the action if you only want leads).
#  - `contact.propertyChange` (with property=lifecyclestage) — promote-
#    to-lead events. Add a sibling YAML for that if needed.

- name: hubspot-contact-creation
  description: Receive HubSpot contact.creation events
  source: hubspot
  events: [contact.creation]
  action: webhook-hubspot-contact

  signature:
    scheme: hmac-sha256
    encoding: base64
    header: X-HubSpot-Signature-v3
    template: "{method}{fullUrl}{body}{timestamp}"
    timestamp:
      header: X-HubSpot-Request-Timestamp
      unit: ms
      tolerance-seconds: 300
    secret-ref:
      oauth-app: hubspot

  tenancy:
    resolver: payload-field
    # HubSpot batches events in a JSON array. The webhook controller
    # unwraps the array and dispatches each inner event through tenancy +
    # signal projection individually, so the resolver sees the already-
    # unwrapped event object — `portalId` at top level, no array-index
    # prefix needed.
    field: portalId
    store: hubspot-portal-id
