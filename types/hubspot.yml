- name: HubSpotContactCreated
  parents: [Signal]
  description: "A new contact was created in HubSpot — fires on the contact.creation webhook"
  properties:
    contactId: "HubSpot contact (object) id"
    portalId: "HubSpot portal (account) id"
    subscriptionType: "Webhook subscription type — always 'contact.creation' for this event"
    changeSource: "How the contact was created (CRM, FORM, IMPORT, INTEGRATION, …)"

# On-demand virtual node (NOT eagerly mirrored). A HubSpot contact is fetched
# only when a Cypher query traverses to it from a canonical :Person, materialized
# transiently for that query, then rolled back. See specs/VIRTUAL_CYPHER.md.
#
#   MATCH (p:Person {email:'x@y.com'})-[:HAS_HUBSPOT_CONTACT]->(hc:HubSpotContact)
#   RETURN hc.jobtitle, hc.phone
#
# Linking: id-match on the shared `email` (Person.email == contact.email). The
# fetch is batched by the `contactsByEmail` producer (one search, emails IN […]),
# so there is no N+1. Contact fields are read by traversal, not projected onto
# Person — the deliberate shift from the old population/mirror model.
- name: HubSpotContact
  parents: [Contact]
  visibility: internal
  userAnchor: false
  description: "A HubSpot CRM contact, fetched on demand and linked to a canonical Person by email."
  # Two ways in:
  #  1. from a canonical Person, by email (read a known person's contact details);
  #  2. from a HubSpotOwner, by owner id — "the contacts this owner owns", which is
  #     how "my contacts" and "Jasper's contacts" resolve (anchor → owner → contacts).
  #     "not emailed lately" then filters the recency fields below.
  #
  #   MATCH (p:Person) WHERE toLower(p.name) CONTAINS 'jasper'
  #   MATCH (p)-[:HAS_HUBSPOT_OWNER]->(o:HubSpotOwner)-[:OWNS_CONTACT]->(c:HubSpotContact)
  #   WHERE c.notes_last_contacted < '2026-05-01' RETURN c.email, c.notes_last_contacted
  virtualJoins:
    - anchorLabel: Person
      relationship: HAS_HUBSPOT_CONTACT
      keyField: primaryEmail   # Person.primaryEmail — the canonical Person email property
                               # (a bare `email` is null on virtually every Person node).
      recordKeyField: email    # contact record's email (id-match against Person.primaryEmail)
      producer: contactsByEmail
      description: "a Person's OWN CRM contact record, matched by email — NOT the contacts they own"
    - anchorLabel: HubSpotOwner
      relationship: OWNS_CONTACT       # (o:HubSpotOwner)-[:OWNS_CONTACT]->(c) = contacts this owner owns
      keyField: id                     # HubSpotOwner.id (the numeric owner id)
      recordKeyField: hubspot_owner_id # contact record's owner id (id-match)
      producer: contactsByOwner
      description: "the contacts a CRM owner OWNS; for \"my contacts\" anchor the owner on (me:AssistantUser)-[:HAS_HUBSPOT_OWNER]->(:HubSpotOwner)"
  properties:
    email:
      description: "Primary email — identity of the contact and the id-match key to Person."
      metadata:
        identity: "true"
        # Opt IN to canonicalization: project contact records onto the canonical Person spine by email
        # (and, via the `company` WORKS_FOR below, onto Organization). Required now that `identity: true`
        # alone is node-identity only — without this hub the contact would never enrich a Person. The
        # Person hub matches against the person's FULL email set (primaryEmail + emails[]), so a contact
        # whose email is any one of the person's addresses still resolves to the one Person.
        hub: Person
    firstname: "Given name. HubSpot stores names as firstname/lastname — there is NO single `name` field; build a display name as `firstname + ' ' + lastname`."
    lastname: "Family name. See firstname."
    jobtitle: "Job title."
    company:
      description: "The contact's free-text `company` PROPERTY — frequently empty. A contact's PRIMARY COMPANY is usually a HubSpot ASSOCIATION (see associatedcompanyid), NOT this property, so this is often null even when a company is shown on the contact in HubSpot."
      # Canonicalize the contact onto a commercial :Organization. The MERGE KEY is the contact's email
      # DOMAIN (derived from `email` above), NOT this free text — so two contacts on the same corporate
      # domain converge on ONE Organization regardless of how they spelled the company. This text only
      # supplies the display NAME. A freemail/no-domain contact yields no Organization (by design — name
      # alone never invents one). Result: `(c:HubSpotContact)-[:WORKS_FOR]->(o:Organization)`, so
      # "my contacts' companies" / "contacts at (acme:Organization {name:'Acme'})" resolve to the shared
      # canonical spine without a HubSpot-specific company walk.
      metadata:
        relationship: WORKS_FOR
        target: Organization
        matchBy: name
    associatedcompanyid: "Id of the contact's PRIMARY associated company (a HubSpot association). Present when the contact is linked to a company even if the `company` text property above is empty; the company NAME requires resolving this id to a HubSpotCompany."
    phone:
      description: "Phone number(s). Null when the contact has no phone set in HubSpot."
      cardinality: LIST
    hs_lead_status: "Lead status (e.g. NEW, OPEN, IN_PROGRESS, OPEN_DEAL, CONNECTED, UNQUALIFIED). Often null when unset."
    createdate: "ISO-8601 timestamp the contact was created in HubSpot (the CRM 'Create Date'). Compare lexically for 'created since X'."
    notes_last_activity_date: "ISO-8601 timestamp of the contact's last activity of ANY kind (email, call, meeting, note, task). Broader than notes_last_contacted / hs_last_sales_activity_timestamp. Compare lexically for 'no activity since X'."
    hubspot_owner_id: "Owner id (digits) — id-match key to HubSpotOwner; who in the CRM owns this contact."
    notes_last_contacted: "ISO-8601 timestamp of the last logged contact (email/call/meeting). Compare lexically for 'not contacted since X'."
    hs_last_sales_activity_timestamp: "ISO-8601 timestamp of the last sales activity on the contact."

# The ORGANIZATION analog — fetched on demand and reached two ways, both converging
# (NORMALIZED) onto one node by the HubSpot object id (`hs_object_id`):
#   1. from a canonical :Organization by DOMAIN (id-match Organization.domain == company.domain);
#   2. from a :HubSpotContact by its PRIMARY-company association id (associatedcompanyid == hs_object_id) —
#      this is how a contact gets its company NAME, since the contact's `company` text property is
#      usually empty (the primary company is an association, not that property).
# Identity is `hs_object_id` (always present, stable) — NOT `domain`, so a company with no web domain
# still materializes and still dedupes. The same company reached from many contacts (and the canonical
# Organization) is ONE node with many incoming edges.
- name: HubSpotCompany
  visibility: internal
  userAnchor: false
  description: "A HubSpot CRM company, fetched on demand. Reached from a canonical Organization by domain, and from a HubSpotContact by its primary-company association — both deduped onto one node by HubSpot object id."
  virtualJoins:
    - anchorLabel: Organization
      relationship: HAS_HUBSPOT_COMPANY
      keyField: domain          # Organization.domain
      recordKeyField: domain    # company record's domain (id-match) — the LINK key (node identity is hs_object_id)
      producer: companiesByDomain
      description: "an Organization's OWN CRM company record, matched by domain"
    - anchorLabel: HubSpotContact
      relationship: HAS_PRIMARY_COMPANY     # (c:HubSpotContact)-[:HAS_PRIMARY_COMPANY]->(co) = the contact's primary company
      keyField: associatedcompanyid         # the contact's primary-company association id
      recordKeyField: hs_object_id          # company object id (id-match) — gives the company NAME for a contact
      producer: companiesById
      description: "the contact's PRIMARY associated company — use this for a contact's company NAME (co.name), since HubSpotContact.company is usually empty"
  properties:
    hs_object_id:
      description: "HubSpot object id — identity of the company; the id a contact's associatedcompanyid points at."
      metadata:
        identity: "true"
    domain:
      description: "Primary web domain — the id-match key to a canonical Organization. May be empty for companies with no web domain."
    name: "Company name."
    industry: "Industry."
    website: "Company website."

# The OWNER / seller anchor — a HubSpot user records can be assigned to. It's the
# identity that scopes "whose contacts": resolved from a canonical :Person by email
# (Person.email == owner.email), so it works for the connecting user ("my contacts")
# AND any colleague who is an owner in the same HubSpot org ("Jasper's contacts").
# A named person who is NOT an owner in the connected org simply resolves to nothing
# — there is no credentialed path to a different tenant, so the query honestly empties.
#
#   MATCH (me:AssistantUser)-[:HAS_PERSON]->(p:Person)-[:HAS_HUBSPOT_OWNER]->(o:HubSpotOwner)
#   MATCH (o)-[:OWNS_CONTACT]->(c:HubSpotContact) RETURN c.email
- name: HubSpotOwner
  visibility: internal
  userAnchor: false
  description: "A HubSpot owner (CRM user/seller), resolved from a Person by email; the anchor for owner-scoped contact queries."
  virtualJoins:
    - anchorLabel: Person
      relationship: HAS_HUBSPOT_OWNER
      keyField: primaryEmail   # anchor key for the pre-pass probe; the resolve chain owns the rest
      recordKeyField: email    # owner record's email (id-match against the Person's canonical email)
      producer: ownersByEmail
      # Write-through identity bridge, resolved LAZILY for ANY person the query names (you OR a
      # colleague), persisted + reused. The chain is tried in order, first match wins:
      writeThrough: true
      resolve:
        - existingBridge                                  # respect a fresh HubSpotOwner already linked
        - canonicalEmail: { producer: ownersByEmail }     # else resolve via the Person's email set
      description: "the CRM owner identity for a person (you, or a colleague who is an owner) — the anchor for owned-contact queries"
  properties:
    id:
      description: "Owner id (digits) — identity, and the key contacts filter by (hubspot_owner_id)."
      metadata:
        identity: "true"
    email:
      description: "Owner's email — the key resolved from the Person."
    firstName: "Owner's first name."
    lastName: "Owner's last name."
